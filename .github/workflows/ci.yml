name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────── Type Check + Lint ────────────
  check:
    name: TypeCheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # ──────────── Unit Tests ────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scg_v2_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: scg_v2_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      SCG_API_KEYS: test-key
      LOG_LEVEL: error
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run migrations
        run: npx ts-node db/migrate.ts
      - name: Run tests
        run: npm run test:ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ──────────── Docker Build ────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t scg-v2:ci .
      - name: Verify image runs
        run: |
          docker run --rm -d --name scg-test \
            -e DB_HOST=host.docker.internal \
            -e SCG_API_KEYS=test \
            -p 3100:3100 \
            scg-v2:ci || true
          sleep 2
          docker stop scg-test 2>/dev/null || true
