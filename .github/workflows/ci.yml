name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────── Type Check + Lint ────────────
  check:
    name: TypeCheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  # ──────────── Unit Tests ────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scg_v2_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: scg_v2_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      SCG_API_KEYS: test-key
      LOG_LEVEL: error
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run migrations
        run: npx ts-node db/migrate.ts
      - name: Run tests
        run: npm run test:ci
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ──────────── Docker Build + Health Check ────────────
  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scg_v2_docker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t scg-v2:ci .
      - name: Start container with real DB
        run: |
          docker run --rm -d --name scg-test \
            --network host \
            -e DB_HOST=localhost \
            -e DB_PORT=5433 \
            -e DB_NAME=scg_v2_docker \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            -e SCG_API_KEYS=test-key \
            -e SCG_ALLOWED_BASE_PATHS=/tmp \
            -e LOG_LEVEL=info \
            scg-v2:ci
      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3100/health; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start within 60s"
          docker logs scg-test
          exit 1
      - name: Verify health endpoint returns HTTP 200
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3100/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check returned HTTP $HTTP_CODE, expected 200"
            docker logs scg-test
            exit 1
          fi
          echo "Health endpoint returned HTTP 200"
      - name: Stop container
        if: always()
        run: docker stop scg-test 2>/dev/null || true
