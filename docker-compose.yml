version: "3.9"

services:
  # ──────────── PostgreSQL ────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scg_v2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scg_v2"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────── ContextZero Server ────────────
  scg:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3100:3100"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: scg_v2
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_MAX_CONNECTIONS: 20
      SCG_PORT: 3100
      SCG_HOST: 0.0.0.0
      SCG_API_KEYS: ${SCG_API_KEYS:?Set SCG_API_KEYS in .env before starting}
      LOG_LEVEL: info
      NODE_ENV: production

volumes:
  pgdata:
